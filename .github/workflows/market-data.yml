name: Build market data

on:
  workflow_dispatch:
  schedule:
    # China trading snapshots: 09:35, 10:05, 10:35, 11:05, 11:35, 13:35, 14:05, 14:35, 14:55, 15:05 CST.
    - cron: "35 1 * * 1-5"
    - cron: "5,35 2 * * 1-5"
    - cron: "5,35 3 * * 1-5"
    - cron: "35 5 * * 1-5"
    - cron: "5,35,55 6 * * 1-5"
    - cron: "5 7 * * 1-5"

jobs:
  build-market-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install market data dependencies
        run: pip install -r services/market-data/requirements.txt
      - name: Build market data
        run: python services/market-data/build_market_data.py build-market-data
      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update market data snapshots"
          file_pattern: apps/web/public/data/*.json
